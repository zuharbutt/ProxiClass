server.port=8080

# MS SQL Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=nuattendance;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA & Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.sql.init.mode=always

# JWT Secret (256-bit)
jwt.secret=NUAttendanceSystemSecretKey2024NUAttendanceSystemSecretKey2024X
jwt.expiration=86400000

# Logging
logging.level.pk.edu.nu=DEBUG
